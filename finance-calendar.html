<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════
 finance-calendar.html — 金十風格財經日曆桌布（Wallpaper Engine 網頁桌布）
 版面：左＝留白（放桌面圖示）｜中右＝時鐘＋總經日曆｜最右＝台股事件

 ★ 縮放／透明度／模糊／強調色 可直接在 Wallpaper Engine 桌布「屬性」
   面板用滑桿調整（需搭配同資料夾 project.json），不必改檔案。

 ── 可調參數（往下找 CONFIG 區塊修改；WE 屬性滑桿會覆蓋前四項）────
 uiScale        整體縮放倍率。WE 以螢幕「原生解析度」渲染、不吃 Windows
                縮放設定，2K/高DPI 螢幕建議 1.2~1.6（預設 1.25）
 panelOpacity   面板不透明度 0~1（預設 0.55；對「HTML 內建底圖」的透明度）
 blurPx         毛玻璃模糊像素（預設 12；0 = 關閉模糊）
 accentColor    強調色（標題圓點、本週事件、日期高亮）
 textColor      文字主色
 bgImage        背景底圖：'bg.jpg' 圖片｜'#0b1220' 純色｜'linear-gradient(…)' 漸層
                ※ WE 是桌布層、底下無物，背景不可全透明
 reloadHours    每 N 小時重新渲染＋重讀資料（預設 6）
 freshCheckMin  每 N 分鐘輕量重讀資料檔，updated 有變才重繪（預設 1；0＝關閉）。
                配合排程的「登入後更新」：開機時頁面先載入舊檔，靠這個在幾分鐘
                內把剛更新的資料換上桌，而不是等 reloadHours 的大週期
 dailyReloadAt  每天此時刻整頁重載，確保「本週」時間窗往前滾（預設 '04:00'）
 autoScrollPxPerSec  清單超出高度時自動慢速輪播（px/秒；0＝關閉）
                桌布收不到滑鼠滾輪，超出的內容靠這個自動來回捲動展示
 autoScrollPauseSec  輪播到頂／底端的停留秒數
 macroWidth /
 eventsWidth    時鐘＋總經日曆欄寬／台股事件欄寬
 showClock      時鐘卡（true / false）
 showQuotes     底部行情條（true / false；資料來自 update_tw_events.py 的 quotes）
 quotesLoop     行情條內容超寬時的滾動模式：true＝頭尾相接連續滾動（跑馬燈，
                速度同 autoScrollPxPerSec、不停頓）；false＝來回輪播（到端點
                停 autoScrollPauseSec 秒再反向）。不超寬時兩者皆靜止
 dynTypes       台股動態事件顯示的類型（預設 ['conference','meeting','punish']）。
                面板分上下兩節：'punish' 以外的類型進上節「預告清單」，列出資料
                窗口內今天（含）以後的所有場次；'punish' 進下節「處置股」，維持
                當日制（只列目標日落在處置期間內者）。除權息資料照抓，預設不顯
                示——把 'dividend' 加回陣列即可在上節恢復（窗口內全列，列數較多）
 colorDividend / colorMeeting / colorConference / colorPunish  四類台股事件標籤色
 ────────────────────────────────────────────────────────────────
 總經日曆國家與重要性 → 在 update_tw_events.py 頂部的
 MACRO_CURRENCIES / MACRO_IMPACTS 設定（資料由腳本抓、此頁自繪；
 原 TradingView widget 在 WE 的 CEF 會崩潰成死圖，故棄用）。
 資料檔：同資料夾 tw_events.js / tw_events.json，
 由 update_tw_events.py 產生（工作排程器定時執行）。
═══════════════════════════════════════════════════════════════════
-->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>財經日曆桌布</title>
<script>
/* 版本標示：顯示在時鐘卡右下角。每批改動（≒每次 commit）手動遞增——
   在 WE 重新點選桌布後看這個小字，就知道新版有沒有真的套用成功。 */
const VERSION = 'v5.5';

/* ═══════════ CONFIG：所有可調參數都在這裡 ═══════════ */
const CONFIG = {
  uiScale:       1.0,

  bgImage:       'bg.jpg',
  panelOpacity:  0.55,
  blurPx:        12,
  textColor:     '#dde4f0',
  accentColor:   '#e0aa54',

  // 資料來源前綴：留空＝相對路徑（讀桌布自身資料夾）。Lively 的 WebView2 會擋掉
  //  絕對 file:// 跨資料夾讀取，故不能指向外部正典夾；資料鮮度改用別的機制解決。
  dataBase:      '',

  reloadHours:   6,
  freshCheckMin: 1,             // 輕量重讀資料檔（updated 有變才重繪；0＝關閉）。v4.5 由 5 改 1：
                                //   睡眠喚醒時頁面重啟常比排程補跑寫完資料早幾十秒，5 分鐘空窗太長；
                                //   本地檔案讀取成本趨近零、沒變不重繪，1 分鐘無感
  dailyReloadAt: '04:00',

  autoScrollPxPerSec: 24,
  autoScrollPauseSec: 4,
  columnAutoScroll:   false,    // 直欄清單過長時：false＝正上/下方 ▴▾ 捲動按鈕（Lively 只轉發點擊、無滾輪）；
                                //   true＝自動來回輪播（WE 在圖示層下連點擊都收不到時用）

  macroWidth:    '500px',
  eventsWidth:   '470px',
  showClock:     true,
  showQuotes:    true,          // 底部行情條（USD/TWD・美債殖利率・原油・大盤・權值股）
  quotesLoop:    true,          // 行情條超寬時：true＝頭尾相接連續滾動（跑馬燈）；
                                // false＝到端點停 autoScrollPauseSec 秒再反向來回

  // 台股動態事件顯示的類型。面板分上下兩節：'punish' 以外進上節「預告清單」
  // （列資料窗口內今天起的所有場次），'punish' 進下節「處置股」（當日制）。
  // 除權息資料仍會抓（tw_events 照樣輸出），只是預設不在面板顯示；
  // 要恢復顯示，把 'dividend' 加進這個陣列即可（會進上節，窗口內全列）。
  dynTypes: ['conference', 'meeting', 'punish'],

  colorDividend:   '#e06060',   // 除權息
  colorMeeting:    '#5b93e0',   // 股東會
  colorConference: '#48b98e',   // 法說會
  colorPunish:     '#d0784a',   // 處置股
};
</script>
<style>
  :root{
    --text:#dde4f0; --accent:#e0aa54;
    --panel-rgb:13,19,32; --panel-o:.55; --blur:12px;
    --macro-w:500px; --right-w:470px;
    --c-div:#e06060; --c-meet:#5b93e0; --c-conf:#48b98e; --c-punish:#d0784a;
    --line:rgba(255,255,255,.08); --dim:rgba(221,228,240,.58);
    --up:#e05555; --dn:#3fae76;            /* 行情條：紅漲綠跌（台股慣例） */
    --qh:0px;                              /* 行情條高度＋grid gap（隱藏時 0px） */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',system-ui,sans-serif;
    color:var(--text); font-size:15.5px; background:#070b12;
  }
  /* 背景底圖（失敗時仍有漸層墊底）——不隨 uiScale 縮放 */
  #bg{position:fixed; inset:0; z-index:-1;
      background-color:#0a0f1a;
      background-image:linear-gradient(135deg,#0a0f1a 0%,#101a2c 55%,#0a0e18 100%);
      background-position:center; background-size:cover; background-repeat:no-repeat;}

  .layout{
    position:fixed; top:0; right:0; display:grid; gap:22px; padding:26px 30px;
    grid-template-columns:minmax(420px,var(--macro-w)) minmax(380px,var(--right-w));
    transform:scale(var(--z, 1)); transform-origin:top right;
  }
  .panel{
    background:rgba(var(--panel-rgb),var(--panel-o));
    -webkit-backdrop-filter:blur(var(--blur)); backdrop-filter:blur(var(--blur));
    border:1px solid var(--line); border-radius:16px;
    box-shadow:0 10px 34px rgba(0,0,0,.38);
    display:flex; flex-direction:column; min-height:0; overflow:hidden;
  }
  .panel>header{
    padding:15px 18px 11px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:10px; flex:none;
  }
  .ttl{font-size:18.5px; font-weight:700; letter-spacing:.5px; display:flex; align-items:center; gap:9px}
  .ttl::before{content:''; width:9px; height:9px; border-radius:50%;
               background:var(--accent); box-shadow:0 0 8px var(--accent)}
  .sub{font-size:13px; color:var(--dim); margin-left:auto}
  .hint{padding:8px 18px 13px; font-size:12.5px; color:var(--dim); flex:none}
  .hint .warn{color:#e0a054}

  /* 中右欄：時鐘＋總經日曆同欄 */
  .col-mid{display:flex; flex-direction:column; gap:22px; min-height:0;
           /* -52px＝.layout 上下 padding（26×2）；-var(--qh)＝行情條佔用高度，
              讓「外框」而非僅內容不超出螢幕 */
           max-height:calc(min(92vh, 92vh / var(--z, 1)) - 52px - var(--qh, 0px))}
  .clockcard{padding:14px 20px 16px; text-align:center; flex:none; width:100%; position:relative}
  #verTag{position:absolute; right:12px; bottom:7px; font-size:10.5px;
          color:var(--dim); opacity:.7; letter-spacing:.5px}
  #clockTime{font-size:52px; font-weight:700; letter-spacing:2px; line-height:1.1;
             font-variant-numeric:tabular-nums}
  #clockDate{font-size:15px; color:var(--dim); margin-top:3px}
  #weekRange{font-size:13px; color:var(--accent); margin-top:7px; letter-spacing:.5px}

  /* 事件列表（總經＋台股共用） */
  .evlist{list-style:none; padding:9px 12px}
  .evlist.scroll{overflow-y:auto; min-height:0;
                 max-height:min(50vh, calc(50vh / var(--z, 1)))}
  /* 台股動態清單鬆綁：不預設壓在 50vh，自然攤開列出全部列（總經清單維持上面那條 50vh 規則不動）。
     欄高防裁切公式不動——多出的高度由 flex-shrink 自然吃掉（.panel 已有 min-height:0、
     overflow:hidden／本清單 overflow-y:auto 讓自動最小高度歸零），整欄真的觸頂時才輪播 */
  #dynList.evlist.scroll{max-height:none}
  .evlist::-webkit-scrollbar{width:0; height:0}   /* 隱藏捲軸（美觀）；捲動改用正上/下方 ▴▾ 按鈕 */
  /* 捲動按鈕：清單正上/正下方，各含一段淡出漸層避免與文字打架，只在該方向有內容時顯示 */
  .scrollctl{position:absolute; left:0; right:0; height:38px; z-index:4;
             display:none; align-items:center; justify-content:center; pointer-events:none}
  .scrollctl.show{display:flex}
  .scrollctl.up{align-items:flex-start; padding-top:3px;
                background:linear-gradient(rgba(var(--panel-rgb),.97), rgba(var(--panel-rgb),0))}
  .scrollctl.dn{align-items:flex-end; padding-bottom:3px;
                background:linear-gradient(rgba(var(--panel-rgb),0), rgba(var(--panel-rgb),.97))}
  .scrollctl .btn{pointer-events:auto; cursor:pointer; width:40px; height:18px; border-radius:10px;
                  display:flex; align-items:center; justify-content:center; font-size:12px; line-height:1;
                  color:var(--dim); background:rgba(var(--panel-rgb),.72); border:1px solid var(--line);
                  box-shadow:0 2px 8px rgba(0,0,0,.4); transition:color .15s, border-color .15s}
  .scrollctl .btn:hover{color:var(--accent); border-color:var(--accent)}
  .scrollctl .btn.totop{flex-direction:column; height:23px; gap:1px}   /* 到底：回頂鈕＝上橫線＋▴ */
  .scrollctl .btn.totop::before{content:''; width:11px; height:2px; border-radius:1px; background:currentColor}

  .ev{display:flex; align-items:center; gap:10px; padding:8px 9px;
      border-radius:9px; margin:2px 0; line-height:1.4}
  .ev .d{font-variant-numeric:tabular-nums; font-size:14px; color:var(--dim);
         min-width:86px; flex:none}
  .ev b{font-weight:600; font-size:15px}
  .ev .n{font-size:13px; color:var(--dim); margin-left:auto; text-align:right; flex:none}
  .ev.week{background:rgba(255,255,255,.045); border-left:3px solid var(--accent); padding-left:11px}
  .ev.week .d{color:var(--accent); font-weight:600}
  .ev.past{opacity:.5}
  .badge{font-size:11.5px; padding:1px 8px; border-radius:20px; flex:none;
         background:var(--accent); color:#141414; font-weight:700}
  .chip{font-size:12px; padding:2px 9px; border-radius:20px; flex:none;
        color:#fff; background:var(--c,#888); opacity:.92}
  .divider{font-size:12px; color:var(--dim); padding:9px 10px 3px; letter-spacing:1px}
  .empty{font-size:13px; color:var(--dim); padding:5px 10px}

  /* 總經列表專用 */
  .dayhead{font-size:13.5px; font-weight:700; color:var(--dim);
           padding:10px 9px 3px; letter-spacing:1px; border-bottom:1px dashed var(--line)}
  .dayhead.today{color:var(--accent)}
  .ev.macro .d{min-width:46px}
  .cchip{font-size:12px; width:22px; height:22px; border-radius:6px; flex:none;
         display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700}
  .cchip.US{background:#3f6fd0}.cchip.EU{background:#6a5bd0}.cchip.JP{background:#c95252}
  .cchip.CN{background:#c9522e}.cchip.GB{background:#3f8ac0}
  .imp{width:9px; height:9px; border-radius:50%; flex:none}
  .imp.high{background:var(--accent); box-shadow:0 0 7px var(--accent)}
  .imp.medium{background:#7f8ea8}
  .ev.macro b{font-size:14.5px; font-weight:500}
  .ev.macro.high b{font-weight:700}

  /* 最右 */
  .col-right{display:flex; flex-direction:column; gap:22px; min-height:0;
             max-height:calc(min(92vh, 92vh / var(--z, 1)) - 52px - var(--qh, 0px))}
  /* 台股固定事件面板固定大小、絕不被壓縮——動態清單鬆綁後列數可能很多，
     欄高不夠時擠壓要全部落在 #dynList 身上（見上面 #dynList.evlist.scroll 規則） */
  #panelFixed{flex:none}

  /* 行情條（底部橫貫兩欄，仿金十 ticker） */
  .ticker{grid-column:1 / -1; flex-direction:row; align-items:center;
          height:44px; padding:0 4px}
  .tlist{list-style:none; display:flex; align-items:center; height:100%;
         overflow-x:hidden; flex-wrap:nowrap; padding:0 14px}
  .tlist li{display:flex; align-items:center; gap:9px; padding:0 16px; flex:none}
  .tlist li+li{border-left:1px solid var(--line)}
  .tlist .tname{font-size:12.5px; color:var(--dim)}
  .tlist .tprice{font-size:15px; font-weight:700; font-variant-numeric:tabular-nums}
  .tlist .tchg{font-size:13px; font-weight:600; font-variant-numeric:tabular-nums}
  .tlist .tchg.up{color:var(--up)}
  .tlist .tchg.dn{color:var(--dn)}
  .tlist .tchg.flat{color:var(--dim)}

  /* 窄視窗（瀏覽器預覽）自動改為雙欄 */
  @media (max-width:1200px){
    .layout{grid-template-columns:1fr 1fr; grid-auto-rows:minmax(0,1fr); overflow:auto}
  }
</style>
</head>
<body>
<div id="bg"></div>

<main class="layout" id="layoutRoot">
  <!-- 中右：時鐘＋總經日曆同欄 -->
  <div class="col-mid">
  <div class="clockcard panel" id="clockCard">
    <div id="clockTime">--:--</div>
    <div id="clockDate"></div>
    <div id="weekRange"></div>
    <div id="verTag"></div>
  </div>
  <section class="panel" id="panelMacro">
    <header>
      <div class="ttl">總經日曆</div>
      <div class="sub" id="macroSub">美國・歐元區・日本｜中高重要性</div>
    </header>
    <ul class="evlist scroll" id="macroList"></ul>
    <div class="hint" id="macroFoot"></div>
  </section>
  </div>

  <!-- 最右 -->
  <div class="col-right">
    <section class="panel" id="panelFixed">
      <header>
        <div class="ttl">台股固定事件</div>
        <div class="sub" id="fixedSub"></div>
      </header>
      <ul class="evlist" id="fixedList"></ul>
    </section>

    <section class="panel" id="panelDyn">
      <header>
        <div class="ttl">台股動態事件</div>
        <div class="sub" id="dynSub"></div>
      </header>
      <ul class="evlist scroll" id="dynList"></ul>
      <div class="hint" id="dynFoot"></div>
    </section>
  </div>

  <!-- 行情條：橫貫兩欄 -->
  <section class="panel ticker" id="panelQuotes">
    <ul class="tlist" id="quoteList"></ul>
  </section>
</main>

<script>
'use strict';
/* ═══════════ 共用工具 ═══════════ */
const $ = id => document.getElementById(id);
const DAY = 86400000;
const WD = ['日','一','二','三','四','五','六'];
const strip = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const addDays = (d, n) => new Date(d.getTime() + n * DAY);
const md = d => `${d.getMonth()+1}/${d.getDate()}`;
const mdw = d => `${md(d)} (${WD[d.getDay()]})`;
const weekStartOf = d => addDays(strip(d), -((d.getDay() + 6) % 7)); // 週一為首
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* 每月第 n 個星期 wd（wd: 0=日…6=六） */
function nthWeekday(y, m, wd, n){
  const first = new Date(y, m, 1);
  return new Date(y, m, 1 + ((wd - first.getDay() + 7) % 7) + 7 * (n - 1));
}

/* 整體縮放：在根元素設 CSS 變數 --z，.layout 用 transform:scale(var(--z))
   等比縮放並貼齊右上角（transform-origin:top right）；縮小＝UI 佔用面積跟著縮小。
   防呆：放大後寬度不得超出視窗左緣（窄視窗／直立螢幕會裁掉左欄），超過就夾到剛好塞下 */
function setScale(z){
  z = z || 1;
  setScale._want = z;                       // 記住原始需求值，resize 時重新計算夾限
  const layoutW = (parseInt(CONFIG.macroWidth) || 500) +
                  (parseInt(CONFIG.eventsWidth) || 470) + 82;  // 82 = 欄距22 + 左右padding 60
  const fit = (window.innerWidth - 8) / layoutW;
  document.documentElement.style.setProperty('--z', Math.min(z, Math.max(0.5, fit)));
}
window.addEventListener('resize', () => setScale(setScale._want || 1));

/* ═══════════ 套用 CONFIG 外觀 ═══════════ */
(function applyTheme(){
  const r = document.documentElement.style;
  r.setProperty('--text', CONFIG.textColor);
  r.setProperty('--accent', CONFIG.accentColor);
  r.setProperty('--panel-o', CONFIG.panelOpacity);
  r.setProperty('--blur', CONFIG.blurPx + 'px');
  r.setProperty('--macro-w', CONFIG.macroWidth);
  r.setProperty('--right-w', CONFIG.eventsWidth);
  r.setProperty('--c-div', CONFIG.colorDividend);
  r.setProperty('--c-meet', CONFIG.colorMeeting);
  r.setProperty('--c-conf', CONFIG.colorConference);
  r.setProperty('--c-punish', CONFIG.colorPunish);

  // 整體縮放（只縮 UI，不縮背景圖；縮小時 UI 佔用面積跟著縮小）
  setScale(CONFIG.uiScale);

  const v = (CONFIG.bgImage || '').trim();
  const bg = $('bg');
  if (!v) { /* 用預設漸層 */ }
  else if (/^(#|rgb|hsl)/i.test(v)) { bg.style.backgroundImage = 'none'; bg.style.backgroundColor = v; }
  else if (v.includes('gradient(')) { bg.style.backgroundImage = v; }
  else { bg.style.backgroundImage =
    `url('${v}'), linear-gradient(135deg,#0a0f1a 0%,#101a2c 55%,#0a0e18 100%)`; }

  if (!CONFIG.showClock) $('clockCard').style.display = 'none';
})();

/* ═══════════ Wallpaper Engine 屬性滑桿（project.json） ═══════════ */
window.wallpaperPropertyListener = {
  applyUserProperties: function(p){
    try{
      const r = document.documentElement.style;
      if (p.uiscale)      setScale(p.uiscale.value / 100);
      if (p.panelopacity) r.setProperty('--panel-o', p.panelopacity.value / 100);
      if (p.blurpx)       r.setProperty('--blur', p.blurpx.value + 'px');
      if (p.accentcolor){
        const c = p.accentcolor.value.split(' ')
                    .map(x => Math.round(parseFloat(x) * 255));
        r.setProperty('--accent', `rgb(${c[0]},${c[1]},${c[2]})`);
      }
    }catch(e){}
  }
};

/* Lively 屬性面板（LivelyProperties.json）→ 複用與 WE 相同的視覺套用邏輯。
   Lively：slider 回傳整數、color 回傳 '#RRGGBB'（與 WE 的 float 三元組不同）。 */
window.livelyPropertyListener = function(name, val){
  try{
    const r = document.documentElement.style;
    switch(name){
      case 'uiscale':      setScale(val / 100); break;
      case 'panelopacity': r.setProperty('--panel-o', val / 100); break;
      case 'blurpx':       r.setProperty('--blur', val + 'px'); break;
      case 'accentcolor':  r.setProperty('--accent', val); break;
    }
  }catch(e){}
};

/* ═══════════ 自動輪播：清單超出高度時慢速來回捲動（僅 CONFIG.columnAutoScroll 啟用）═══════════
   給 WE 這類「桌布在圖示層下、收不到滑鼠滾輪」的環境；Lively 可原生捲動，預設關閉 */
function setupAutoScroll(el){
  if (el._as){ cancelAnimationFrame(el._as.raf); clearTimeout(el._as.tm); }
  const speed = CONFIG.autoScrollPxPerSec;
  if (!speed || speed <= 0) return;
  const st = el._as = { dir: 1, pos: el.scrollTop, raf: 0, tm: 0, last: 0 };
  function step(t){
    if (!st.last) st.last = t;
    const dt = Math.min(100, t - st.last); st.last = t;
    const max = el.scrollHeight - el.clientHeight;
    if (max > 4){
      st.pos = Math.max(0, Math.min(max, st.pos + st.dir * speed * dt / 1000));
      el.scrollTop = st.pos;
      // 端點須含行進方向：起步時 pos=0，無方向判斷會在原地反覆翻轉方向、永遠不動
      if ((st.dir > 0 && st.pos >= max) || (st.dir < 0 && st.pos <= 0)){ // 到端點：停一下再反向
        st.dir *= -1; st.last = 0;
        st.tm = setTimeout(() => { st.raf = requestAnimationFrame(step); },
                           (CONFIG.autoScrollPauseSec || 3) * 1000);
        return;
      }
    } else { st.pos = 0; }
    st.raf = requestAnimationFrame(step);
  }
  st.tm = setTimeout(() => { st.raf = requestAnimationFrame(step); },
                     (CONFIG.autoScrollPauseSec || 3) * 1000);
}

/* ═══════════ 捲動按鈕（預設）═══════════
   Lively 的滑鼠轉發只含「移動＋點擊」、不含滾輪/拖曳，故過長清單在正上/正下方各放一顆 ▴/▾
   按鈕，點一下捲近一頁（平滑）。捲軸已隱藏；按鈕含淡出漸層避開文字，且只在該方向還有內容時顯示。 */
function setupScrollButtons(list){
  if (list._as){ cancelAnimationFrame(list._as.raf); clearTimeout(list._as.tm); list._as = null; }
  const panel = list.closest('.panel');
  if (!panel) return;
  panel.style.position = 'relative';
  const header = panel.querySelector('header');
  const foot = panel.querySelector('.hint');
  const page = () => Math.max(40, list.clientHeight - 46);   // 每次捲近一頁（留重疊）
  let up = panel.querySelector('.scrollctl.up');
  let dn = panel.querySelector('.scrollctl.dn');
  if (!up){                                                  // 每個 panel 只建一次，之後只刷新
    up = document.createElement('div'); up.className = 'scrollctl up'; up.innerHTML = '<div class="btn">▴</div>';
    dn = document.createElement('div'); dn.className = 'scrollctl dn'; dn.innerHTML = '<div class="btn">▾</div>';
    panel.append(up, dn);
    up.querySelector('.btn').addEventListener('click', () => list.scrollBy({ top: -page(), behavior: 'smooth' }));
    dn.querySelector('.btn').addEventListener('click', () => {
      const max = list.scrollHeight - list.clientHeight;
      if (list.scrollTop >= max - 4) list.scrollTo({ top: 0, behavior: 'smooth' });   // 已到底 → 回頂
      else list.scrollBy({ top: page(), behavior: 'smooth' });                          // 否則 → 往下翻一頁
    });
    list.addEventListener('scroll', () => list._sbRefresh && list._sbRefresh());
    if (window.ResizeObserver) new ResizeObserver(() => list._sbRefresh && list._sbRefresh()).observe(list);
  }
  list._sbRefresh = () => {
    up.style.top = (header ? header.offsetHeight : 0) + 'px';
    dn.style.bottom = (foot ? foot.offsetHeight : 0) + 'px';
    const max = list.scrollHeight - list.clientHeight, overflow = max > 4;
    const atBottom = list.scrollTop >= max - 4;
    up.classList.toggle('show', overflow && list.scrollTop > 4);
    dn.classList.toggle('show', overflow);                        // 有超出就一直顯示（到底時切成「回頂」鈕）
    const b = dn.querySelector('.btn');
    b.classList.toggle('totop', atBottom);
    b.textContent = atBottom ? '▴' : '▾';                          // 到底＝回頂（▴＋上橫線），否則＝往下翻頁（▾）
  };
  list._sbRefresh();
}

/* ═══════════ 總經日曆（自繪，資料來自 tw_events.js 的 macro） ═══════════ */
function renderMacro(data){
  const ul = $('macroList');
  ul.innerHTML = '';
  const rows = (data && Array.isArray(data.macro)) ? data.macro : null;
  if (data && data.macro_meta)
    $('macroSub').textContent = `${data.macro_meta.countries}｜${data.macro_meta.importance}`;
  if (!rows || !rows.length){
    ul.innerHTML = '<div class="empty">尚無總經資料 —— 請執行 update_tw_events.py（見 README 排程設定）</div>';
    $('macroFoot').textContent = '';
    return;
  }
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let lastDate = '';
  for (const e of rows){
    // 有 ts（epoch 秒，新資料）→ 日期分組／時間顯示改走本機時區；
    // 無 ts（舊資料，向後相容）→ 沿用既有台北字串（e.date／e.time／e.dt）路徑
    const hasTs = typeof e.ts === 'number';
    const localD = hasTs ? new Date(e.ts * 1000) : null;
    const groupKey = hasTs
      ? `${localD.getFullYear()}-${String(localD.getMonth()+1).padStart(2,'0')}-${String(localD.getDate()).padStart(2,'0')}`
      : e.date;
    if (groupKey !== lastDate){
      lastDate = groupKey;
      const headD = hasTs ? localD : new Date(e.date + 'T00:00:00');
      ul.insertAdjacentHTML('beforeend',
        `<div class="dayhead${groupKey === todayStr ? ' today' : ''}">${mdw(headD)}${groupKey === todayStr ? '　今天' : ''}</div>`);
    }
    const evTime = hasTs
      ? `${String(localD.getHours()).padStart(2,'0')}:${String(localD.getMinutes()).padStart(2,'0')}`
      : e.time;
    const past = hasTs ? (localD < now) : (new Date(e.dt) < now);
    const vals = [];
    if (e.forecast) vals.push(`預 ${esc(e.forecast)}`);
    if (e.previous) vals.push(`前 ${esc(e.previous)}`);
    ul.insertAdjacentHTML('beforeend',
      `<li class="ev macro ${e.impact}${past ? ' past' : ''}">
         <span class="d">${esc(evTime)}</span>
         <span class="cchip ${esc(e.country)}">${esc(e.flag)}</span>
         <span class="imp ${e.impact === 'high' ? 'high' : 'medium'}"></span>
         <b title="${esc(e.title_en)}">${esc(e.title)}</b>
         <span class="n">${vals.join('｜')}</span>
       </li>`);
  }
  // 先跳到第一筆未發生的事件，再交給自動輪播
  const first = ul.querySelector('.ev:not(.past)');
  if (first) ul.scrollTop = Math.max(0, first.offsetTop - ul.offsetTop - 34);
  else ul.insertAdjacentHTML('beforeend',
    '<div class="empty">之後暫無資料 —— 排程執行 update_tw_events.py 會補上下週</div>');
  // 頁腳時區標示改動態：off 為本機相對 UTC 的小時數（東九區＝+9）；
  // 直接字串化，非整數時區（UTC+5.5、UTC+5.75）自然帶小數、正負號正確
  const off = -new Date().getTimezoneOffset() / 60;
  const offStr = (off >= 0 ? '+' : '') + off;
  $('macroFoot').innerHTML =
    `資料更新：${esc(data.updated || '—')}｜時間為本機時區（UTC${offStr}）｜預=預測值 前=前值`;
  if (CONFIG.columnAutoScroll) setupAutoScroll(ul); else setupScrollButtons(ul);
}

/* ═══════════ 台股固定事件（純本地計算） ═══════════ */
function fixedOccurrences(monthsAhead){
  const today = strip(new Date());
  const list = [];
  for (let k = 0; k <= monthsAhead; k++){
    const y = today.getFullYear(), m = today.getMonth() + k;
    const yy = new Date(y, m, 1).getFullYear(), mm = new Date(y, m, 1).getMonth();

    // 台指期／選擇權結算：每月第三個週三
    list.push({ date: nthWeekday(yy, mm, 3, 3), tag: '期權',
                label: '台指期／選擇權結算' });

    // 台股＋那斯達克／道瓊期指季度結算：3/6/9/12 月第三個週五
    if ([2, 5, 8, 11].includes(mm))
      list.push({ date: nthWeekday(yy, mm, 5, 3), tag: '季結算',
                  label: '台股・那指・道瓊期貨季度結算' });

    // 月營收公布截止：每月 10 日（公布上一個月）
    const rev = new Date(yy, mm, 10);
    const pm = new Date(yy, mm, 0).getMonth() + 1;
    list.push({ date: rev, tag: '營收', label: `${pm}月營收公布截止（10日前）` });

    // 財報公布截止
    const fin = {2: [31, 'Q4＋年報'], 4: [15, 'Q1'], 7: [14, 'Q2'], 10: [14, 'Q3']}[mm];
    if (fin)
      list.push({ date: new Date(yy, mm, fin[0]), tag: '財報',
                  label: `${fin[1]} 財報公布截止` });
  }
  return list.sort((a, b) => a.date - b.date);
}

function renderFixed(){
  const today = strip(new Date());
  const ws = weekStartOf(today), we = addDays(ws, 6);
  $('fixedSub').textContent = `本週 ${md(ws)} – ${md(we)}`;
  $('weekRange').textContent = `本週 ${md(ws)} – ${md(we)}`;

  const occ = fixedOccurrences(13);
  const inWeek = occ.filter(o => o.date >= ws && o.date <= we);
  const nexts = [];
  for (const o of occ){                       // 每一類事件的「下一次」
    if (o.date <= we) continue;
    if (nexts.some(n => n.tag === o.tag)) continue;
    nexts.push(o);
  }

  const ul = $('fixedList');
  ul.innerHTML = '';
  if (!inWeek.length)
    ul.insertAdjacentHTML('beforeend', '<div class="empty">本週無固定事件</div>');
  for (const o of inWeek){
    const isToday = o.date.getTime() === today.getTime();
    const past = o.date < today;
    ul.insertAdjacentHTML('beforeend',
      `<li class="ev week${past ? ' past' : ''}">
         <span class="d">${mdw(o.date)}</span><b>${o.label}</b>
         ${isToday ? '<span class="badge">今天</span>' : ''}
       </li>`);
  }
  ul.insertAdjacentHTML('beforeend', '<div class="divider">── 下一次 ──</div>');
  for (const o of nexts.sort((a, b) => a.date - b.date))
    ul.insertAdjacentHTML('beforeend',
      `<li class="ev past"><span class="d">${mdw(o.date)}</span><b>${o.label}</b></li>`);
}

/* ═══════════ 台股動態事件（上下兩節） ═══════════
   上節「預告清單」（法說會・股東會）：列資料窗口內今天（含）以後的所有場次——
   這類是預先排定的行程，只看目標日幾乎天天空白，故不採當日制。
   下節「處置股」維持當日制：目標日（今天是交易日→今天；否則往後找下一個
   交易日，上限 30 天）落在處置期間內者全列。
   window.__TEST_TODAY（'YYYY-MM-DD'）可覆寫「今天」供測試，只影響本節邏輯，
   不影響台股固定事件（renderFixed）與時鐘（tickClock）。 */
const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

/* 台股「今天」跟隨系統（觀看者）日期：人在東京過了午夜即視為新的一天，
   遇週末／休市就順延顯示下一交易日（2026-07-11 使用者定案；
   資料抓取「窗口」則在 update_tw_events.py 錨定台北，兩者分工不同）。 */
const todayBase = () => strip(window.__TEST_TODAY ? new Date(window.__TEST_TODAY + 'T00:00:00') : new Date());

function isTradingDay(d, holidays){
  const wd = d.getDay();
  return wd !== 0 && wd !== 6 && !holidays.has(isoDate(d));
}

function targetDay(holidays){
  const base = todayBase();
  for (let i = 0; i <= 30; i++){
    const d = addDays(base, i);
    if (isTradingDay(d, holidays)) return d;
  }
  return base;   // 理論上不會走到（30 天內必有交易日）
}

const TYPE_META = {
  dividend:   { chip: '除權息', cls: 'var(--c-div)'    },
  meeting:    { chip: '股東會', cls: 'var(--c-meet)'   },
  conference: { chip: '法說會', cls: 'var(--c-conf)'   },
  punish:     { chip: '處置',   cls: 'var(--c-punish)' },
};

function renderDyn(data){
  const ul = $('dynList');
  ul.innerHTML = '';
  if (!data || !Array.isArray(data.events)){
    ul.innerHTML = '<div class="empty">讀不到 tw_events 資料 —— 請先執行 update_tw_events.py</div>';
    $('dynFoot').textContent = '';
    return;
  }
  const holidays = new Set(Array.isArray(data.holidays) ? data.holidays : []);
  const today = todayBase();
  const todayIso = isoDate(today);
  const target = targetDay(holidays);
  const targetIso = isoDate(target);
  const isToday = target.getTime() === today.getTime();
  $('dynSub').textContent = isToday ? `今日 ${mdw(target)}` : `休市，順延 ${mdw(target)}`;

  // ── 上節：預告清單（dynTypes 中 punish 以外的類型；窗口內今天起全列）──
  const upTypes = CONFIG.dynTypes.filter(t => t !== 'punish');
  if (upTypes.length){
    const label = upTypes.map(t => TYPE_META[t].chip).join('・');
    ul.insertAdjacentHTML('beforeend', `<div class="dayhead">${label}｜近兩週</div>`);
    const rows = data.events
      .filter(e => upTypes.includes(e.type) && e.date >= todayIso)   // ISO 字串比較即可
      .sort((a, b) => a.date.localeCompare(b.date)
        || CONFIG.dynTypes.indexOf(a.type) - CONFIG.dynTypes.indexOf(b.type)
        || (a.code || '').localeCompare(b.code || ''));
    if (!rows.length)
      ul.insertAdjacentHTML('beforeend', `<div class="empty">近兩週無${label}</div>`);
    for (const e of rows){
      let note = (e.note || '').replace(/^除[權息]+\s*/, '');
      if (note === TYPE_META[e.type].chip) note = '';   // 來源欄位與 chip 同字（如「法說會」）不重述
      ul.insertAdjacentHTML('beforeend',
        `<li class="ev">
           <span class="d">${mdw(new Date(e.date + 'T00:00:00'))}</span>
           <span class="chip" style="--c:${TYPE_META[e.type].cls}">${TYPE_META[e.type].chip}</span>
           <b>${esc(e.code)} ${esc(e.name)}</b>
           ${e.date === todayIso ? '<span class="badge">今天</span>' : ''}
           <span class="n">${esc(note)}</span>
         </li>`);
    }
  }

  // ── 下節：處置股（當日制：目標日落在處置期間內全列）──
  if (CONFIG.dynTypes.includes('punish')){
    ul.insertAdjacentHTML('beforeend',
      `<div class="dayhead">處置股｜${isToday ? '今日' : `順延 ${md(target)}`}</div>`);
    const rows = (Array.isArray(data.punish) ? data.punish : [])   // 缺鍵（舊資料）視為空陣列
      .filter(p => p.start <= targetIso && targetIso <= p.end)
      .sort((a, b) => (a.code || '').localeCompare(b.code || ''));
    if (!rows.length)
      ul.insertAdjacentHTML('beforeend', '<div class="empty">當日無處置股</div>');
    for (const e of rows){
      const timesPrefix = e.times >= 2 ? `第${e.times}次・` : '';
      const marketPrefix = e.market === '上櫃' ? '櫃・' : '';
      ul.insertAdjacentHTML('beforeend',
        `<li class="ev">
           <span class="chip" style="--c:${TYPE_META.punish.cls}">${TYPE_META.punish.chip}</span>
           <b>${esc(e.code)} ${esc(e.name)}</b>
           <span class="n">${esc(`${marketPrefix}${timesPrefix}至 ${md(new Date(e.end + 'T00:00:00'))}`)}</span>
         </li>`);
    }
  }

  // 頁腳：更新時間＋過期／錯誤提醒
  const fetchedTs = data.fetched || data.updated;   // fetched＝最後一次真的抓到新資料（v4.4）；舊資料檔無此欄退回 updated
  let foot = `資料更新：${esc(fetchedTs || '—')}`;
  if (fetchedTs){
    const age = (Date.now() - new Date(fetchedTs.replace(' ', 'T'))) / DAY;
    if (age > 3) foot += `　<span class="warn">⚠ 已 ${Math.floor(age)} 天未更新，請檢查工作排程</span>`;
  }
  if (data.errors && data.errors.length)
    foot += `　<span class="warn">⚠ ${data.errors.length} 個來源異常</span>`;
  $('dynFoot').innerHTML = foot;
  if (CONFIG.columnAutoScroll) setupAutoScroll(ul); else setupScrollButtons(ul);
}

/* ═══════════ 行情條（底部橫貫，資料來自 tw_events.js 的 quotes） ═══════════ */
function fmtQuotePrice(q){
  switch (q.kind){
    case 'yield':  return q.price.toFixed(2) + '%';
    case 'fx':
    case 'cmdty':  return q.price.toFixed(2);
    case 'index':  return Math.round(q.price).toLocaleString('zh-Hant');
    case 'stock':  return q.price >= 1000
                     ? Math.round(q.price).toLocaleString('zh-Hant')
                     : q.price.toFixed(1);
    default:       return String(q.price);
  }
}

/* 回傳 {dir, text}；dir ∈ up/dn/flat 供上色（紅漲綠跌，台股慣例）。
   yield（美債殖利率）顯示絕對值、不加 %；其餘顯示 chg_pct。
   四捨五入後才算「是否為 0」，避免顯示 ▲ 0.00% 這種箭頭與數字矛盾的畫面 */
function fmtQuoteChg(q){
  if (q.kind === 'yield'){
    const v = Math.abs(q.chg_abs).toFixed(2);
    if (Number(v) === 0) return { dir: 'flat', text: '—' };
    return { dir: q.chg_abs > 0 ? 'up' : 'dn', text: `${q.chg_abs > 0 ? '▲' : '▼'} ${v}` };
  }
  const v = Math.abs(q.chg_pct).toFixed(2);
  if (Number(v) === 0) return { dir: 'flat', text: '—' };
  return { dir: q.chg_pct > 0 ? 'up' : 'dn', text: `${q.chg_pct > 0 ? '▲' : '▼'} ${v}%` };
}

function quoteRowHtml(q){
  const { dir, text } = fmtQuoteChg(q);
  return `<li>
    <span class="tname">${esc(q.name)}</span>
    <span class="tprice">${fmtQuotePrice(q)}</span>
    <span class="tchg ${dir}">${text}</span>
  </li>`;
}

/* 水平自動輪播——邏輯鏡射 setupAutoScroll（含端點判斷帶行進方向，
   否則會在起點反覆翻轉方向、永遠不動），操作 scrollLeft／scrollWidth／clientWidth。
   loopAt（px）＝頭尾相接模式：內容已複製兩份（renderQuotes 負責），單向連續前進，
   捲過一份內容的寬度就無縫跳回開頭（兩份內容相同、視覺無縫），不停頓、立即起步 */
function setupAutoScrollX(el, loopAt){
  if (el._as){ cancelAnimationFrame(el._as.raf); clearTimeout(el._as.tm); }
  const speed = CONFIG.autoScrollPxPerSec;
  if (!speed || speed <= 0) return;
  const st = el._as = { dir: 1, pos: el.scrollLeft, raf: 0, tm: 0, last: 0 };
  function step(t){
    if (!st.last) st.last = t;
    const dt = Math.min(100, t - st.last); st.last = t;
    if (loopAt > 0){
      st.pos += speed * dt / 1000;
      while (st.pos >= loopAt) st.pos -= loopAt;   // while 非 if：速度調極大時單幀可能跨過一圈以上
      el.scrollLeft = st.pos;
      st.raf = requestAnimationFrame(step);
      return;
    }
    const max = el.scrollWidth - el.clientWidth;
    if (max > 4){
      st.pos = Math.max(0, Math.min(max, st.pos + st.dir * speed * dt / 1000));
      el.scrollLeft = st.pos;
      if ((st.dir > 0 && st.pos >= max) || (st.dir < 0 && st.pos <= 0)){
        st.dir *= -1; st.last = 0;
        st.tm = setTimeout(() => { st.raf = requestAnimationFrame(step); },
                           (CONFIG.autoScrollPauseSec || 3) * 1000);
        return;
      }
    } else { st.pos = 0; }
    st.raf = requestAnimationFrame(step);
  }
  if (loopAt > 0) st.raf = requestAnimationFrame(step);
  else st.tm = setTimeout(() => { st.raf = requestAnimationFrame(step); },
                          (CONFIG.autoScrollPauseSec || 3) * 1000);
}

function renderQuotes(data){
  const wrap = $('panelQuotes');
  const ul = $('quoteList');
  const rows = (data && Array.isArray(data.quotes)) ? data.quotes : [];
  if (!CONFIG.showQuotes || !rows.length){
    wrap.style.display = 'none';
    document.documentElement.style.setProperty('--qh', '0px');
    if (ul._as){ cancelAnimationFrame(ul._as.raf); clearTimeout(ul._as.tm); ul._as = null; }
    return;
  }
  wrap.style.display = '';
  document.documentElement.style.setProperty('--qh', '66px');   // 44px 條高 + 22px grid gap
  ul.innerHTML = rows.map(quoteRowHtml).join('');
  ul.scrollLeft = 0;
  // 先停舊動畫：若本輪內容變成不超寬就不會再進 setupAutoScrollX，避免舊 loopAt 動畫殘留
  if (ul._as){ cancelAnimationFrame(ul._as.raf); clearTimeout(ul._as.tm); ul._as = null; }
  if (ul.scrollWidth > ul.clientWidth){
    if (CONFIG.quotesLoop){
      // 頭尾相接：先確認單份內容確實超寬才複製第二份（否則複製本身會造成超寬），
      // 一份的精確寬度＝第二份首項與第一份首項的 offsetLeft 差（含項間邊框與間距）
      const n = ul.children.length;
      ul.insertAdjacentHTML('beforeend', rows.map(quoteRowHtml).join(''));
      setupAutoScrollX(ul, ul.children[n].offsetLeft - ul.children[0].offsetLeft);
    } else {
      setupAutoScrollX(ul);
    }
  }
}

/* ═══════════ 資料載入（tw_events.js → 失敗改 fetch json） ═══════════ */
let lastGoodData = null;   /* 韌性：載入失敗時沿用上次成功資料，避免面板被清空
                              （2026-07-10 曾目擊重載後數分鐘面板短暫消失又自行恢復；
                              觸發源未定罪，先根除症狀——首載即失敗仍顯示提示字） */
function isEmptyPayload(d){   /* 合法但全空的 payload（如斷網時資料層仍寫出 updated 較新
                                  但 macro/events/punish/quotes 皆空的檔案）；holidays 不計入 */
  if (!d) return false;
  const len = k => (d[k] && d[k].length) || 0;
  return len('macro') + len('events') + len('punish') + len('quotes') === 0;
}
function renderData(data){
  if (data && isEmptyPayload(data) && lastGoodData && !isEmptyPayload(lastGoodData)){
    console.warn('[finance-calendar] 新資料為空 payload，沿用上次成功資料。updated=',
      data.updated, 'errors=', (data.errors && data.errors.length) || 0);
    return;
  }
  if (data) lastGoodData = data;
  else data = lastGoodData;
  renderMacro(data); renderDyn(data); renderQuotes(data);
}

let loadBusyMs = 0;  /* 防重入（v4.5）：>0＝已有一次載入在途。凍結解除時心跳與恢復的
                        freshCheck 會幾乎同時呼叫 loadData，兩個動態 script 併發會透過
                        共享的 window.TW_EVENTS 互相干擾（remove() 不會中止在途請求），
                        序列化後才安全；本地檔案毫秒級完成，30 秒為卡死保險絲 */
function loadData(onlyIfChanged = false){
  /* onlyIfChanged＝輕量檢查模式（freshCheckMin 週期）：updated 沒變或讀取失敗
     都靜默返回、不重繪，避免無謂打斷清單輪播；正式重讀由 refreshAll 走原路 */
  if (loadBusyMs && Date.now() - loadBusyMs < 30 * 1000) return;
  loadBusyMs = Date.now();
  const done = d => {
    loadBusyMs = 0;
    if (onlyIfChanged){
      if (!d || (lastGoodData && d.updated === lastGoodData.updated)) return;
    }
    renderData(d);
  };
  const old = $('twEventsScript');
  if (old) old.remove();
  window.TW_EVENTS = undefined;
  const s = document.createElement('script');
  s.id = 'twEventsScript';
  s.src = CONFIG.dataBase + 'tw_events.js?t=' + Date.now();
  s.onload = () => done(window.TW_EVENTS);
  s.onerror = () =>
    fetch(CONFIG.dataBase + 'tw_events.json?t=' + Date.now())
      .then(r => r.json()).then(done)
      .catch(() => done(null));
  document.body.appendChild(s);
}

/* ═══════════ 時鐘（兼任凍結偵測心跳） ═══════════ */
let lastTickMs = Date.now();
function tickClock(){
  const n = new Date();
  /* 凍結偵測（v4.5）：WE 暫停（視窗最大化／全螢幕）與系統睡眠會把頁面連計時器一起
     凍結，freshCheck 的 5 分鐘須累計「未凍結時間」才數得滿，喚醒後可能長期不觸發。
     解凍後第一個 tick 發現時間大幅跳躍 → 立即補一次輕量重讀（updated 有變才重繪）；
     跨日（含自然過午夜）→ 全面重繪，讓台股「今天」與固定事件翻日。 */
  const jumpMs = n.getTime() - lastTickMs;
  const dateChanged = new Date(lastTickMs).toDateString() !== n.toDateString();
  lastTickMs = n.getTime();
  if (dateChanged) refreshAll();
  else if (jumpMs > 90 * 1000) loadData(true);
  $('clockTime').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  $('clockDate').textContent =
    `${n.getFullYear()}/${n.getMonth()+1}/${n.getDate()}　週${WD[n.getDay()]}`;
}

/* ═══════════ 重載排程 ═══════════ */
function refreshAll(){ renderFixed(); loadData(); }

refreshAll();
tickClock();
$('verTag').textContent = VERSION;
setInterval(tickClock, 1000);
setInterval(refreshAll, Math.max(1, CONFIG.reloadHours) * 3600 * 1000);
if (CONFIG.freshCheckMin > 0)             // 開機／排程更新後幾分鐘內把新資料換上桌
  setInterval(() => loadData(true), CONFIG.freshCheckMin * 60 * 1000);

(function scheduleDailyReload(){          // 每天 dailyReloadAt 整頁重載
  const [h, m] = CONFIG.dailyReloadAt.split(':').map(Number);
  const now = new Date();
  const t = new Date(now); t.setHours(h || 4, m || 0, 0, 0);
  if (t <= now) t.setDate(t.getDate() + 1);
  setTimeout(() => location.reload(), t - now);
})();
</script>
